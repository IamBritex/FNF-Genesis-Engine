<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNF Genesis Engine</title>
    <link rel="stylesheet" href="public/html/index.css">
    <link rel="icon" sizes="16x16" href="public/html/icon16.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"/>

    <!--  LIBRERIAS  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.86.0/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>  
</head>
<body>
    <div id="game-container">
        <button id="fullscreen-btn" tabindex="-1">
            <span class="material-symbols-outlined">fullscreen</span>
        </button>
    </div>

    <!-- Scripts del juego -->
    <script type="module" src="src/Main.js"></script>
    <script src="src/config/AndroidSuport.js"></script>
    <script type="module" src="src/states/PlayState.js"></script>
    <script type="module" src="src/states/StoryModeState.js"></script>
    <script type="module" src="src/effects/flash.js"></script>
    <script type="module" src="src/states/IntroMenu.js"></script>
    <script type="module" src="src/effects/TransitionScene.js"></script>
    <script type="module" src="src/states/GfDanceState.js"></script>
    <script type="module" src="src/states/OptionsState.js"></script>
    <script type="module" src="src/states/substates/CharacterEditor.js"></script>
    <script type="module" src="src/states/substates/EditorsState.js"></script>
    <script type="module" src="src/states/MainMenuState.js"></script>

    <script>
        // Check if device is mobile
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        if (isMobile) {
            fullscreenBtn.addEventListener('focus', function(event) {
                event.target.blur();
            });
        } else {
            fullscreenBtn.style.display = 'none';
        }
    </script>
</body>
</html>
