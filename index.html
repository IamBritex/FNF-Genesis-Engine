<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>Friday Night Funkin': Genesis Engine</title>
    <link rel="stylesheet" href="public/html/index.css">
    <link rel="icon" sizes="16x16" href="public/html/icon16.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"/>

    <!--  LIBRERIAS  -->
    <script src="source/libs/phaser.min.js"></script>
    <script src="source/libs/gsap.min.js"></script> 
</head>
<body>
    <div id="game-container">
        <button id="fullscreen-btn" tabindex="-1">
            <span class="material-symbols-outlined">fullscreen</span>
        </button>
    </div>
  
    <!-- Scripts del juego -->
    <script type="module" src="source/core/Main.js"></script>
    <script src="source/core/AndroidSuport.js"></script>
    <script type="module" src="source/funkin/states/PlayState.js"></script>
    <script type="module" src="source/funkin/states/StoryModeState.js"></script>
    <script type="module" src="source/funkin/states/FreePlayState.js"></script>
    <script type="module" src="source/funkin/visuals/effects/flash.js"></script>
    <script type="module" src="source/funkin/states/IntroMenu.js"></script>
    <script type="module" src="source/funkin/visuals/effects/TransitionScene.js"></script>
    <script type="module" src="source/funkin/states/GfDanceState.js"></script>
    <script type="module" src="source/funkin/states/OptionsState.js"></script>
    <script type="module" src="source/funkin/editors/CharacterEditor.js"></script>
    <script type="module" src="source/funkin/editors/EditorsState.js"></script>
    <script type="module" src="source/funkin/states/MainMenuState.js"></script>

    <script>
        // Check if device is mobile
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        if (isMobile) {
            fullscreenBtn.addEventListener('focus', function(event) {
                event.target.blur();
            });
        } else {
            fullscreenBtn.style.display = 'none';
        }
    </script>
</body>
</html>
