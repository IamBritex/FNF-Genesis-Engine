<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Phaser — Group Renaming</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>
<style>
  body { margin:0; background:#0d1117; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; overflow: hidden; }

  /* --- ESTILOS --- */

  .layer-base {
    width: 280px;
    box-sizing: border-box;
    user-select: none;
    position: absolute;
    border-radius: 6px;
    transition: transform 0.1s; 
  }

  /* Ítems */
  .layer-item {
    padding: 0 15px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #161b22;
    color: #c9d1d9;
    border: 1px solid #30363d;
    font-size: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* Carpetas */
  .layer-folder {
    background: #1c2128; 
    border: 1px solid #444c56;
    overflow: hidden; 
  }
  
  .folder-header {
    width: 100%;
    height: 32px;
    background: #2d333b;
    color: #adbac7;
    font-size: 12px;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-weight: 600;
    border-bottom: 1px solid #444c56;
    cursor: default; /* Cursor normal */
  }

  /* Flecha clickeable */
  .folder-arrow {
    display: inline-block;
    width: 20px;
    text-align: center;
    margin-right: 5px;
    transition: transform 0.2s;
    font-size: 10px;
    cursor: pointer;
    padding: 5px 0;
  }

  /* Título clickeable (para editar) */
  .folder-title {
    flex-grow: 1;
    cursor: text;
    padding: 4px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .folder-title:hover {
    color: #ffffff;
    text-decoration: underline dotted #666;
  }

  /* Input de Edición */
  .folder-input {
    background: #0d1117;
    border: 1px solid #1f6feb;
    color: white;
    font-size: 12px;
    font-weight: bold;
    padding: 2px 5px;
    width: 150px;
    outline: none;
    border-radius: 4px;
  }

  .collapsed .folder-arrow { transform: rotate(-90deg); }
  
  /* ESTADOS */

  .dragging {
    background: #1f6feb !important;
    color: white !important;
    border-color: #1f6feb !important;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    z-index: 999999 !important; 
    cursor: grabbing;
  }

  .in-folder {
    width: 250px !important; 
    border-left: 3px solid #444c56; 
  }

  .merge-target {
    border: 2px dashed #2ea043 !important; 
    background: #132318 !important;
  }
  .merge-target .folder-header {
    background: #1f4026 !important;
    color: #4db35f !important;
  }

</style>
</head>

<body>

<script>

const ITEM_HEIGHT = 50;
const FOLDER_HEADER_HEIGHT = 32;
const GAP = 8;

class LayerObject {
  constructor(scene, id, isFolder = false) {
    this.scene = scene;
    this.id = id; // ID interno o texto inicial
    this.name = id; // Nombre editable
    this.isFolder = isFolder;
    
    this.y = 0;
    this.targetY = 0;
    this.parentFolder = null;
    this.isCollapsed = false; 
    this.isRenaming = false; // Estado de edición
    
    this.el = document.createElement("div");
    
    if (!isFolder) {
      this.el.className = "layer-base layer-item";
      this.el.innerHTML = `<span>${id}</span> <span style='opacity:0.5'>☰</span>`;
      this.height = ITEM_HEIGHT;
    } else {
      this.el.className = "layer-base layer-folder";
      // Estructura HTML separada para Flecha y Título
      this.el.innerHTML = `
        <div class="folder-header">
          <span class="folder-arrow">▼</span>
          <span class="folder-title">${this.name}</span>
        </div>`;
      
      this.childrenItems = [];
      this.height = FOLDER_HEADER_HEIGHT + GAP;

      // --- EVENTOS DEL HEADER ---
      const arrow = this.el.querySelector('.folder-arrow');
      const titleSpan = this.el.querySelector('.folder-title');
      
      // 1. Click en Flecha -> Colapsar
      arrow.addEventListener('pointerdown', (e) => {
         e.stopPropagation(); // No arrastrar si doy justo en la flecha
         // Esperar click (up) para colapsar
      });
      arrow.addEventListener('click', (e) => {
         e.stopPropagation();
         this.toggleCollapse();
      });

      // 2. Doble Click en Título -> Renombrar
      titleSpan.addEventListener('dblclick', (e) => {
          e.stopPropagation(); // No colapsar
          this.startRenaming();
      });
      
      // Para permitir arrastre desde el título si es un click simple, 
      // no ponemos stopPropagation en pointerdown del título, 
      // pero sí controlaremos el "editing mode".
    }

    this.dom = scene.add.dom(0, 0, this.el);
    this.dom.setOrigin(0.5, 0);
    
    this.dragging = false;
    
    // Timers
    this.clickStartTime = 0;
    this.startDragX = 0;
    this.startDragY = 0;
    this.hasMoved = false;

    this.el.addEventListener("pointerdown", (e) => this.onDown(e));

    this._onMove = (e) => this.onMove(e);
    this._onUp = (e) => this.onUp(e);
    document.addEventListener("pointermove", this._onMove);
    document.addEventListener("pointerup", this._onUp);
  }

  destroy() {
    document.removeEventListener("pointermove", this._onMove);
    document.removeEventListener("pointerup", this._onUp);
    this.dom.destroy();
  }

  // --- LÓGICA DE RENOMBRADO ---

  startRenaming() {
    if (this.isRenaming) return;
    this.isRenaming = true;

    const header = this.el.querySelector('.folder-header');
    const titleSpan = this.el.querySelector('.folder-title');
    
    // Ocultar span
    titleSpan.style.display = 'none';

    // Crear Input
    const input = document.createElement('input');
    input.type = 'text';
    input.value = this.name;
    input.className = 'folder-input';
    
    // Insertar input
    header.appendChild(input);
    input.focus();
    input.select(); // Seleccionar todo el texto

    // Evitar arrastre sobre el input
    input.addEventListener('pointerdown', (e) => e.stopPropagation());
    input.addEventListener('click', (e) => e.stopPropagation());
    input.addEventListener('dblclick', (e) => e.stopPropagation());

    // Guardar al perder foco o presionar Enter
    const finish = () => {
        this.name = input.value || "Group"; // Evitar vacíos
        this.finishRenaming(input, titleSpan);
    };

    input.addEventListener('blur', finish);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            input.blur(); // Dispara blur que llama a finish
        }
    });
  }

  finishRenaming(input, titleSpan) {
    if (!this.isRenaming) return;
    
    // Actualizar texto
    titleSpan.textContent = this.name;
    titleSpan.style.display = ''; // Mostrar de nuevo
    
    // Limpiar input
    if (input.parentNode) input.parentNode.removeChild(input);
    
    this.isRenaming = false;
  }

  // --- FIN LÓGICA RENOMBRADO ---

  setY(y) { this.targetY = y; }

  toggleCollapse() {
    if (!this.isFolder) return;
    this.isCollapsed = !this.isCollapsed;
    
    if (this.isCollapsed) this.el.classList.add('collapsed');
    else this.el.classList.remove('collapsed');

    this.scene.refreshLayout();
  }

  calculateHeight() {
    if (!this.isFolder) return ITEM_HEIGHT;
    if (this.isCollapsed) return FOLDER_HEADER_HEIGHT; 
    return FOLDER_HEADER_HEIGHT + (this.childrenItems.length * (ITEM_HEIGHT + GAP)) + 10; 
  }

  update() {
    // VISIBILIDAD
    if (this.parentFolder) {
       if (this.parentFolder.isCollapsed) {
           this.dom.setVisible(false);
           this.el.style.display = 'none';
       } else {
           this.dom.setVisible(true);
           this.el.style.display = this.isFolder ? 'block' : 'flex';
       }
       if (!this.el.classList.contains('in-folder')) this.el.classList.add('in-folder');
    } else {
       this.dom.setVisible(true);
       this.el.style.display = this.isFolder ? 'block' : 'flex';
       this.el.classList.remove('in-folder');
    }

    // MOVIMIENTO
    const parentDragging = this.parentFolder && this.parentFolder.dragging;
    if (!this.dragging && !parentDragging) {
      this.y += (this.targetY - this.y) * 0.25;
      this.dom.y = this.y;
    } 
    
    const targetX = this.parentFolder ? 175 : 160;
    this.dom.x = targetX;

    if (this.isFolder) {
        this.height = this.calculateHeight();
        this.el.style.height = `${this.height}px`;
    }
  }

  onDown(e) {
    // Si está editando, no hacer nada de Drag
    if (this.isRenaming) return;
    // Si es click en el input (por seguridad)
    if (e.target.tagName === 'INPUT') return;

    if (this.parentFolder && this.parentFolder.isCollapsed) return; 

    // IMPORTANTE: Detener propagación para que Phaser no capture inputs extraños
    // pero permitir que el evento llegue si queremos click vs drag
    e.stopPropagation(); 
    
    this.clickStartTime = Date.now();
    this.startDragX = e.clientX;
    this.startDragY = e.clientY;
    this.hasMoved = false;

    this.dragging = true;
    this.dragStartY = e.clientY;
    this.dragStartDomY = this.dom.y;
    
    this.el.classList.add("dragging");
    this.scene.onDragStart(this);
  }

  onMove(e) {
    if (!this.dragging) return;

    if (!this.hasMoved) {
        const dist = Math.hypot(e.clientX - this.startDragX, e.clientY - this.startDragY);
        if (dist > 5) this.hasMoved = true;
    }

    const delta = e.clientY - this.dragStartY;
    this.dom.y = this.dragStartDomY + delta;
    this.y = this.dom.y; 

    // Mover hijos
    if (this.isFolder && this.childrenItems.length > 0) {
        this.childrenItems.forEach(child => {
             const layoutDiff = child.targetY - this.targetY;
             child.dom.y = this.dom.y + layoutDiff;
             child.y = child.dom.y; 
        });
    }

    this.scene.handleDrag(this);
  }

  onUp(e) {
    if (!this.dragging) return;
    this.dragging = false;
    this.el.classList.remove("dragging");

    // Click simple en header (que no sea la flecha ni el input) colapsa
    // Solo si no se movió y no fue sobre la flecha (que ya tiene su listener)
    const timeDiff = Date.now() - this.clickStartTime;
    const isArrow = e.target.classList.contains('folder-arrow');
    
    if (this.isFolder && timeDiff < 250 && !this.hasMoved && !isArrow && !this.isRenaming) {
        // Si el usuario dio clic en el TÍTULO (single click), 
        // aquí decidimos si colapsa o no. 
        // Si quieres que single click en título NO colapse (para solo drag), comenta abajo:
        this.toggleCollapse();
    }

    this.scene.onDragEnd(this);
  }
}

// --- MAIN SCENE (SIN CAMBIOS IMPORTANTES, SOLO COPY PASTE DEL ANTERIOR) ---
class MainScene extends Phaser.Scene {
  create() {
    this.rootList = []; 
    this.allObjects = []; 

    ["Layer 1", "Layer 2", "Layer 3", "Layer 4"].forEach((t) => {
      const item = new LayerObject(this, t);
      this.rootList.push(item);
      this.allObjects.push(item);
    });

    this.mergeCandidate = null;
    this.refreshLayout();
  }

  update() {
    this.allObjects.forEach(obj => obj.update());
  }

  refreshLayout() {
    let currentY = 40;
    let globalZ = 10;

    this.rootList.forEach((obj) => {
      obj.parentFolder = null;
      obj.setY(currentY);
      obj.dom.setDepth(globalZ); 
      
      if (obj.isFolder) {
        obj.height = obj.calculateHeight();
        
        if (obj.childrenItems.length > 0) {
           let childY = currentY + FOLDER_HEADER_HEIGHT + 5; 
           
           obj.childrenItems.forEach(child => {
             child.parentFolder = obj;
             child.setY(obj.isCollapsed ? currentY : childY);
             child.dom.setDepth(obj.isCollapsed ? -1 : globalZ + 100);

             if (!obj.isCollapsed) {
               childY += ITEM_HEIGHT + GAP;
             }
           });
        }
      } 

      if (obj.dragging) obj.dom.setDepth(999999);
      if (obj.isFolder) obj.childrenItems.forEach(c => { if(c.dragging) c.dom.setDepth(999999); });

      currentY += obj.isFolder ? obj.height + GAP : ITEM_HEIGHT + GAP;
      globalZ += 1;
    });
  }

  onDragStart(dragItem) {}

  handleDrag(dragItem) {
    this.clearMergeCandidate();

    // 1. Dentro de carpeta
    if (dragItem.parentFolder) {
        const folder = dragItem.parentFolder;
        if (dragItem.y < folder.y - 15 || dragItem.y > folder.y + folder.height + 15) {
            this.extractFromFolder(dragItem);
            return;
        }
        this.reorderList(folder.childrenItems, dragItem);
        return; 
    }

    // 2. Root
    if (!dragItem.isFolder) {
      let handledByFolder = false;

      for (const target of this.rootList) {
        if (target === dragItem) continue;
        
        if (target.isFolder) {
           const edgeMargin = 15; 
           const topEdge = target.y + edgeMargin;
           const bottomEdge = target.y + target.height - edgeMargin;

           if (dragItem.y > topEdge && dragItem.y < bottomEdge) {
               if (target.isCollapsed) {
                   this.setMergeCandidate(target);
                   handledByFolder = true;
                   break; 
               } else {
                   this.moveToFolder(dragItem, target);
                   this.reorderList(target.childrenItems, dragItem);
                   handledByFolder = true;
                   break; 
               }
           }
        } else {
           let targetCenterY = target.y + 25; 
           if (Math.abs(dragItem.y - targetCenterY) < 15) {
               this.setMergeCandidate(target);
               handledByFolder = true;
               break; 
           }
        }
      }
      if (handledByFolder) return;
    }

    this.reorderList(this.rootList, dragItem);
  }

  reorderList(list, dragItem) {
    const idx = list.indexOf(dragItem);
    if (idx === -1) return;

    const prev = list[idx - 1];
    const next = list[idx + 1];
    
    if (prev) {
        const prevCenter = prev.y + (prev.height / 2);
        if (dragItem.y < prevCenter) {
            this.swap(list, idx, idx - 1);
            return;
        }
    }
    if (next) {
        const nextCenter = next.y + (next.height / 2);
        if (dragItem.y > nextCenter) {
            this.swap(list, idx, idx + 1);
            return;
        }
    }
  }

  swap(list, a, b) {
    [list[a], list[b]] = [list[b], list[a]];
    this.refreshLayout();
  }

  setMergeCandidate(target) {
    if (this.mergeCandidate !== target) {
      this.clearMergeCandidate();
      this.mergeCandidate = target;
      target.el.classList.add("merge-target");
    }
  }

  clearMergeCandidate() {
    if (this.mergeCandidate) {
      this.mergeCandidate.el.classList.remove("merge-target");
      this.mergeCandidate = null;
    }
  }

  onDragEnd(dragItem) {
    if (this.mergeCandidate) {
      if (this.mergeCandidate.isFolder) {
        this.moveToFolder(dragItem, this.mergeCandidate);
      } else {
        this.createFolderWith(dragItem, this.mergeCandidate);
      }
      this.clearMergeCandidate();
    }
    this.cleanupEmptyFolders();
    this.refreshLayout();
  }

  createFolderWith(dragItem, targetItem) {
    const folder = new LayerObject(this, "Group", true);
    this.allObjects.push(folder);
    const idx = this.rootList.indexOf(targetItem);
    
    this.removeFromRoot(dragItem);
    this.removeFromRoot(targetItem);

    this.rootList.splice(idx, 0, folder);
    folder.childrenItems.push(targetItem);
    folder.childrenItems.push(dragItem);
    
    targetItem.parentFolder = folder;
    dragItem.parentFolder = folder;
    folder.isCollapsed = false;
  }

  moveToFolder(item, folder) {
    this.removeFromRoot(item);
    if (item.parentFolder && item.parentFolder !== folder) {
        this.extractFromFolder(item, false);
    }
    if (!folder.childrenItems.includes(item)) {
        folder.childrenItems.push(item);
        item.parentFolder = folder;
    }
    if (folder.isCollapsed) folder.isCollapsed = false;
    this.refreshLayout();
  }

  extractFromFolder(item, insertToRoot = true) {
    if (!item.parentFolder) return;
    const f = item.parentFolder;
    const idx = f.childrenItems.indexOf(item);
    if (idx > -1) f.childrenItems.splice(idx, 1);
    item.parentFolder = null;
    if (insertToRoot) {
      const fIdx = this.rootList.indexOf(f);
      this.rootList.splice(fIdx + 1, 0, item);
    }
    if (f.childrenItems.length === 0) this.deleteFolder(f);
    this.refreshLayout();
  }

  removeFromRoot(item) {
    const idx = this.rootList.indexOf(item);
    if (idx > -1) this.rootList.splice(idx, 1);
  }

  cleanupEmptyFolders() {
    [...this.rootList].forEach(obj => {
       if (obj.isFolder && obj.childrenItems.length === 0) this.deleteFolder(obj);
    });
  }

  deleteFolder(folder) {
    this.removeFromRoot(folder);
    const aIdx = this.allObjects.indexOf(folder);
    if (aIdx > -1) this.allObjects.splice(aIdx, 1);
    folder.destroy();
  }
}

const config = {
  type: Phaser.AUTO,
  width: 340,
  height: 600,
  backgroundColor: '#0d1117',
  parent: document.body,
  scene: MainScene,
  dom: { createContainer: true }
};

new Phaser.Game(config);

</script>

</body>
</html>
